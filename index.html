<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Études</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#111827);
color:white;
padding:30px
}

.section{
margin-bottom:40px
}

.title{
font-size:30px;
border-bottom:1px solid #555;
padding-bottom:8px;
margin-bottom:20px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:22px
}

.big{
font-size:34px;
font-weight:bold
}
</style>

</head>

<body>

<h1>Dashboard Études</h1>

<div class=section>

<div class=title>Vue globale</div>

<div class=grid>

<div class=card>
<h3>Fin du diplôme</h3>
<div id=diploma class=big></div>
</div>

<div class=card>
<h3>Semaines de cours restantes</h3>
<div id=weeks class=big></div>
</div>

<div class=card>
<h3>Argent gagné depuis le début des études</h3>
<div id=money class=big></div>
</div>

</div>
</div>


<div class=section>

<div class=title>Fin des cours par année</div>

<div class=grid>

<div class=card>
<h3>3A</h3>
<div id=c1 class=big></div>
</div>

<div class=card>
<h3>4A</h3>
<div id=c2 class=big></div>
</div>

<div class=card>
<h3>5A</h3>
<div id=c3 class=big></div>
</div>

</div>
</div>

<script>

const diploma=new Date("2028-09-30T23:59:59");

const salaryPerMonth=1291.61;

const studyStart=
new Date("2025-09-13T00:00:00");

const schoolPeriods=[

/* GARDE ICI TON TABLEAU COMPLET
   EXACTEMENT COMME IL EST ACTUELLEMENT
   SANS RIEN MODIFIER */

];

const dates=[

["c1",new Date("2026-07-10")],
["c2",new Date("2027-04-30")],
["c3",new Date("2028-05-05")]

];

function fmt(d){

let diff=d-new Date();

if(diff<=0)
return "Terminé ✅";

let days=Math.floor(
diff/86400000
);

return days+
" jours<br>"+
(days/7).toFixed(1)+
" semaines";

}


function remainingSchool(){

let now=new Date();

let totalWeeks=
schoolPeriods.length;

let completedWeeks=0;

schoolPeriods.forEach(p=>{

let end=
new Date(p[1]);

end.setHours(
23,
59,
59,
999
);

if(now>end){

completedWeeks++;

}

});

let remaining=
Math.max(
0,
totalWeeks-completedWeeks
);

return remaining;

}


function earnedMoney(){

let now=
new Date();

let elapsed=
now-studyStart;

if(elapsed<=0)
return "0,00 €";

let msPerMonth=
365.2425/12*
24*
60*
60*
1000;

let earned=
(elapsed/msPerMonth)
*
salaryPerMonth;

return earned.toLocaleString(
"fr-FR",
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
)+" €";

}


function upd(){

document.getElementById(
"diploma"
).innerHTML=
fmt(diploma);

document.getElementById(
"weeks"
).innerHTML=
remainingSchool()+
" semaines";

document.getElementById(
"money"
).innerHTML=
earnedMoney();

dates.forEach(
d=>
document.getElementById(
d[0]
).innerHTML=
fmt(d[1])
);

}

upd();

setInterval(
upd,
1000
);

</script>

</body>
</html>
