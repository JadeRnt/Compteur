<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Études</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    padding:30px;
}

.section{
    margin-bottom:40px;
}

.title{
    font-size:30px;
    border-bottom:1px solid #555;
    padding-bottom:8px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,.08);
    padding:20px;
    border-radius:22px;
}

.big{
    font-size:34px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>Dashboard Études</h1>

<div class="section">

<div class="title">Vue globale</div>

<div class="grid">

<div class="card">
<h3>Fin du diplôme</h3>
<div id="diploma" class="big"></div>
</div>

<div class="card">
<h3>Semaines de cours restantes</h3>
<div id="weeks" class="big"></div>
</div>

<div class="card">
<h3>Sous gagnés depuis le début des études</h3>
<div id="money" class="big"></div>
</div>

</div>
</div>


<div class="section">

<div class="title">Fin des cours par année</div>

<div class="grid">

<div class="card">
<h3>3A</h3>
<div id="c1" class="big"></div>
</div>

<div class="card">
<h3>4A</h3>
<div id="c2" class="big"></div>
</div>

<div class="card">
<h3>5A</h3>
<div id="c3" class="big"></div>
</div>

<div class="card">
<h3>Semaines restantes 3A</h3>
<div id="w1" class="big"></div>
</div>

<div class="card">
<h3>Semaines restantes 4A</h3>
<div id="w2" class="big"></div>
</div>

<div class="card">
<h3>Semaines restantes 5A</h3>
<div id="w3" class="big"></div>
</div>

</div>
</div>


<script>

const schoolPeriods=[

["2025-10-13","2025-10-17"],

["2026-01-19","2026-01-23"],

["2026-02-09","2026-02-13"],
["2026-02-16","2026-02-20"],
["2026-02-23","2026-02-27"],

["2026-03-16","2026-03-20"],
["2026-03-23","2026-03-27"],
["2026-03-30","2026-04-03"],

["2026-05-26","2026-05-29"],

["2026-06-01","2026-06-05"],
["2026-06-08","2026-06-12"],

["2026-06-29","2026-07-03"],
["2026-07-06","2026-07-10"],


["2026-08-31","2026-09-04"],
["2026-09-07","2026-09-11"],

["2026-09-28","2026-10-02"],
["2026-10-05","2026-10-09"],
["2026-10-26","2026-10-30"],

["2026-11-02","2026-11-06"],
["2026-11-09","2026-11-13"],

["2026-11-30","2026-12-04"],

["2027-01-18","2027-01-22"],

["2027-02-08","2027-02-12"],

["2027-02-22","2027-02-26"],

["2028-04-17","2028-04-21"],
["2028-04-24","2028-04-28"],
["2028-05-02","2028-05-05"]

];

const dates=[

["c1",new Date("2026-07-10")],
["c2",new Date("2027-04-30")],
["c3",new Date("2028-05-05")]

];

const monthlySalary=1291.61;
const studyStart=new Date("2025-10-13T00:00:00");

function fmt(d){

let diff=d-new Date();

if(diff<=0) return "Terminé ✅";

let days=Math.floor(diff/86400000);

return days+
" jours<br>"+
(days/7).toFixed(1)+
" semaines";

}

function remainingSchool(){

let now=new Date();

let totalWeeks=schoolPeriods.length;
let completedWeeks=0;

schoolPeriods.forEach(p=>{

let end=new Date(p[1]);

end.setHours(23,59,59,999);

if(now>end){
completedWeeks++;
}

});

return Math.max(
0,
totalWeeks-completedWeeks
);

}

function remainingYearWeeks(year){

let now=new Date();

let count=0;

schoolPeriods.forEach(p=>{

let start=new Date(p[0]);
let end=new Date(p[1]);

end.setHours(
23,
59,
59,
999
);

let currentYear;

if(start<new Date("2026-08-01")){
currentYear=3;
}
else if(start<new Date("2027-08-01")){
currentYear=4;
}
else{
currentYear=5;
}

if(
currentYear===year &&
now<=end
){
count++;
}

});

return count;

}

function moneyEarned(){

let now=new Date();

if(now<studyStart){
return "0.00 €";
}

let elapsed=now-studyStart;

const avgMonthMs=
30.4375*
24*
60*
60*
1000;

let money=
(elapsed/avgMonthMs)
*monthlySalary;

return money.toLocaleString(
"fr-FR",
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
)+" €";

}

function upd(){

document.getElementById(
"diploma"
).innerHTML=
fmt(diploma);

document.getElementById(
"weeks"
).innerHTML=
remainingSchool()+" semaines";

document.getElementById(
"money"
).innerHTML=
moneyEarned();

dates.forEach(d=>{

document.getElementById(
d[0]
).innerHTML=
fmt(d[1]);

});

document.getElementById(
"w1"
).innerHTML=
remainingYearWeeks(3)
+" semaines";

document.getElementById(
"w2"
).innerHTML=
remainingYearWeeks(4)
+" semaines";

document.getElementById(
"w3"
).innerHTML=
remainingYearWeeks(5)
+" semaines";

}

upd();

setInterval(
upd,
1000
);

</script>

</body>
</html>
